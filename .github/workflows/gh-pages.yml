    name: Build and Deploy Jekyll site to GitHub Pages

    on:
      push:
        branches:
          - master # 或者你的主分支，例如 master, production
      workflow_dispatch: # 允许手动触发

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false

    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Setup Ruby
            uses: ruby/setup-ruby@v1
            with:
              ruby-version: '3.1' # Chirpy gemspec 指定了 ~> 3.1, 你可以调整为 3.1, 3.2, 3.3 等
              bundler-cache: true # Runs bundle install and caches installed gems automatically
              cache-version: 0 # Optional: Increment to invalidate cache
          - name: Setup Pages
            id: pages
            uses: actions/configure-pages@v4
          - name: Build with Jekyll
            # Outputs to the './_site' directory by default
            run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
            env:
              JEKYLL_ENV: production
          - name: Upload artifact
            uses: actions/upload-pages-artifact@v3
            with:
              # Upload entire repository to GitHub Pages to preserve folder structure
              path: './_site'

      deploy:
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@v4